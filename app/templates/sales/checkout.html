{% extends "base.html" %}
{% block content %}
<div class="checkout-layout">

  <div class="checkout-top">
    <h2>Kassa</h2>

    <div class="scanner-bar">
      <svg class="scanner-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 3.75 9.375v-4.5ZM3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5a1.125 1.125 0 0 1-1.125-1.125v-4.5ZM13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 13.5 9.375v-4.5Z"/>
      </svg>
      <input
        id="scanner-input"
        type="text"
        autocomplete="off"
        spellcheck="false"
        placeholder="Scan barcode of zoek op naam / pakketcode..."
        hx-get="{{ url_for('products.search') }}"
        hx-trigger="input changed delay:120ms"
        hx-target="#search-results"
        hx-vals="js:{q: document.getElementById('scanner-input').value}"
      />
    </div>
    <p class="hint">Barcode of pakketcode → direct toevoegen &nbsp;|&nbsp; Naam → kies uit lijst &nbsp;|&nbsp; Enter bij 1 resultaat</p>

    <div id="search-results"></div>
  </div>

  <!-- Bottom: cart -->
  <div class="checkout-bottom">
    <h2>Winkelmandje</h2>

    <form method="post" action="{{ url_for('sales.record') }}" id="cart-form">
      <div id="cart-items">
        <p class="empty" id="cart-empty">Mandje is leeg.</p>
      </div>

      <div class="cart-footer">
        <div class="cart-total">
          <span>Totaal</span>
          <span id="cart-total-amount">€ 0,00</span>
        </div>

        <select name="payment_method" class="input-select">
          <option value="cash">Contant</option>
          <option value="payconiq">Payconiq</option>
          <option value="mixed">Gemengd</option>
        </select>

        <input type="text" name="note" placeholder="Opmerking (optioneel)" class="input-text" />

        <button type="submit" class="btn btn-primary btn-large" id="checkout-btn" disabled>Afrekenen</button>
      </div>
    </form>
  </div>

</div>

<script src="{{ url_for('static', filename='js/checkout.js') }}"></script>
{% endblock %}
