<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="#8B4789"/>
  
  <!-- Needle icon (stylized) -->
  <g transform="translate(128, 128)">
    <!-- Thread spool -->
    <rect x="-40" y="-15" width="80" height="30" rx="4" fill="#E8D5E8" opacity="0.3"/>
    
    <!-- Needle -->
    <line x1="0" y1="-80" x2="0" y2="50" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Eye of needle -->
    <circle cx="0" cy="-50" r="6" fill="none" stroke="#FFD700" stroke-width="3"/>
    
    <!-- Thread loop -->
    <path d="M -30 -30 Q -40 0 -20 40" stroke="#E8D5E8" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 30 -30 Q 40 0 20 40" stroke="#E8D5E8" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="128" y="220" font-size="20" font-weight="bold" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif">
    Steek
  </text>
</svg>
